# Scan profile for the vuln-app integration container.
# See vuln-static/hyperz.yaml for the enable-vs-assertion contract
# and the ${ORIGIN_HTTP} placeholder convention.
mode: aggressive
crawl:
  enabled: true

# dom-xss is the only check in the catalog that requires a headless
# browser; opting in here keeps the dependency cost isolated to the
# one container that exercises a DOM sink. The harness preflights for
# a Chrome/Chromium binary and skips the subtest cleanly when none is
# reachable (see requireBrowser in harness.go).
js:
  enabled: true

url:
  - "${ORIGIN_HTTP}/"

checks:
  pollute: true
  # sqli-error / sqli-boolean / sqli-time moved out to vuln-sqli
  # (SQLite + SLEEP UDF). nosqli moved out to vuln-nosqli (mongomock).
  # ldapi moved out to vuln-ldap (ldap3 MOCK_SYNC). graphql-audit
  # moved out to vuln-graphql (graphene). Each got its own container
  # so the oracle exercises a real parser / evaluator rather than a
  # hand-crafted response.
  enable:
    - open-redirect
    - host-header-injection
    - cache-poisoning
    - crlf-injection
    - ssrf
    - reflected-xss
    - path-traversal
    - cmd-injection
    - cmd-injection-blind
    - insecure-deserialization
    - xxe
    - ssti
    - idor
    - stored-xss
    - jwt-vulns
    - sse-audit
    - dom-xss
