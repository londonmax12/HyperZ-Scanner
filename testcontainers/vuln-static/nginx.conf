worker_processes 1;
events { worker_connections 256; }

http {
    include            /etc/nginx/mime.types;
    default_type       application/octet-stream;
    sendfile           on;
    server_tokens      on;

    # Deliberate banner leak: nginx version stamped in Server header
    # (server_tokens on) plus a custom X-Powered-By so server-leak
    # fires twice.
    map $sent_http_x_powered_by $unused1 { default ""; }
    add_header X-Powered-By "PHP/5.6.40" always;

    # OAuth discovery endpoint with weak shape: HS256 signing alg
    # only, plain HTTP issuer, no PKCE required. oauth-discovery flags
    # these on the well-known doc.
    server {
        listen 80 default_server;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # well-known docs are passive-discovered by openapi-audit and
        # oauth-discovery without any link.
        location = /.well-known/oauth-authorization-server {
            default_type application/json;
            return 200 '{"issuer":"http://vuln-static","authorization_endpoint":"http://vuln-static/oauth/authorize","token_endpoint":"http://vuln-static/oauth/token","token_endpoint_auth_methods_supported":["client_secret_basic"],"id_token_signing_alg_values_supported":["HS256","none"],"response_types_supported":["token","code"],"grant_types_supported":["implicit","password"],"code_challenge_methods_supported":["plain"],"scopes_supported":["openid"]}';
        }

        location = /openapi.json {
            default_type application/json;
            # Deliberately leaky spec: embeds an AWS access key id in
            # an example, declares global bearerAuth but exposes one
            # operation with security: [] (auth opted out), and ships
            # an example Authorization: Bearer token. openapi-audit
            # flags all three.
            return 200 '{"openapi":"3.0.0","info":{"title":"Vuln API","version":"1.0","description":"AWS_ACCESS_KEY_ID=AKIAIOSFODNN7EXAMPLE"},"servers":[{"url":"http://vuln-static"}],"components":{"securitySchemes":{"bearerAuth":{"type":"http","scheme":"bearer"}}},"security":[{"bearerAuth":[]}],"paths":{"/users/{id}":{"get":{"summary":"get user","parameters":[{"name":"id","in":"path","required":true,"schema":{"type":"integer"}},{"name":"Authorization","in":"header","example":"Bearer eyJhbGciOiJIUzI1NiJ9.eyJzdWIiOiJhZG1pbiJ9.signature","schema":{"type":"string"}}],"responses":{"200":{"description":"ok"}}}},"/admin/delete":{"post":{"summary":"delete (no auth)","security":[],"responses":{"200":{"description":"ok"}}}}}}';
        }

        # Hidden paths the content-discovery wordlist routinely hits.
        location = /admin       { return 200 "admin panel"; }
        location = /admin.php   { return 200 "admin php"; }
        location = /backup.zip  { return 200 "backup"; }
        location = /.env        { return 200 "DB_PASSWORD=changeme"; }
        location = /phpinfo.php { return 200 "<title>phpinfo()</title>"; }

        # JSONP gadget on an "allowed" host - csp-bypass probes for
        # this exact shape.
        location = /jsonp {
            default_type application/javascript;
            return 200 'window.cb && cb({"hello":"world"})';
        }

        # CORS misconfig: wildcard + allow credentials. Triggers
        # cors-config (passive read on the seed).
        location = /api/profile {
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Credentials "true" always;
            default_type application/json;
            return 200 '{"id":1,"email":"a@b.c"}';
        }

        # CORS reflection: echo the request Origin back. Triggers
        # cors-reflection on any active probe.
        location = /api/reflect {
            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Credentials "true" always;
            default_type application/json;
            return 200 '{"ok":true}';
        }

        # Serve a source map alongside the JS file. source-map-exposure
        # probes both the .map and the SourceMappingURL comment in the JS.
        location ~ \.js$ {
            add_header SourceMap "/app.js.map" always;
            try_files $uri =404;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }

    # HTTPS server: weak TLS profile (TLS 1.0/1.1 + RC4-like) for
    # tls-audit, weak HSTS, missing CSP/XFO, mixed-content references,
    # insecure cookie. The cert is the self-signed one baked into the
    # image at build time.
    server {
        listen 443 ssl default_server;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        ssl_certificate     /etc/nginx/tls/server.crt;
        ssl_certificate_key /etc/nginx/tls/server.key;
        # ECDHE-only; no ssl_dhparam needed and OpenSSL 3 rejects small DH params.
        ssl_protocols       TLSv1 TLSv1.1 TLSv1.2;
        ssl_ciphers         "AES128-SHA:DES-CBC3-SHA:HIGH:!aNULL:!MD5";
        ssl_prefer_server_ciphers on;

        # Weak HSTS (short max-age, no includeSubDomains). hsts-weak
        # fires when present-but-weak.
        add_header Strict-Transport-Security "max-age=60" always;
        # Permissive CSP triggers csp-weak.
        add_header Content-Security-Policy "default-src 'unsafe-inline' 'unsafe-eval' *" always;
        add_header X-Powered-By "Express" always;

        # Author reached for cross-origin isolation but explicitly opted
        # out via unsafe-none, so the header has no protective effect.
        # Triggers cross-origin-isolation (coop-unsafe-none weakness).
        add_header Cross-Origin-Opener-Policy "unsafe-none" always;

        # Insecure cookie on every response: missing Secure, HttpOnly,
        # SameSite. cookie-attributes flags each.
        add_header Set-Cookie "session=abc; Path=/" always;

        # cache-control-sensitive: sensitive-looking JSON without
        # Cache-Control: no-store.
        location = /account {
            default_type application/json;
            return 200 '{"email":"victim@example.com","balance":1234}';
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
