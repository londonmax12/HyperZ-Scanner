# Scan profile for the vuln-react-inline integration container.
# See vuln-static/hyperz.yaml for the enable-vs-assertion contract
# and the ${ORIGIN_HTTP} placeholder convention.
#
# This container exercises the same react-dev-build-in-prod check as
# vuln-react, but via the banner-fallback detection path rather than
# the script-src filename path; see the Dockerfile / server.js
# comments and the harness entry for the split.
mode: default
crawl:
  enabled: true

url:
  - "${ORIGIN_HTTP}/"

checks:
  enable:
    - react-dev-build-in-prod
