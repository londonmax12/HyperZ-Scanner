worker_processes 1;
events { worker_connections 64; }

http {
    server {
        listen 80 default_server;
        server_name _;

        # Make every response at the host root look like an unclaimed
        # S3 bucket: status 404 + AmazonS3 Server header + the
        # x-amz-* identifiers + the NoSuchBucket body. subdomain-
        # takeover's fingerprint-only path requires body + header
        # together, no DNS gymnastics.
        location / {
            add_header Server "AmazonS3" always;
            add_header x-amz-request-id "ABCDEF1234567890" always;
            add_header x-amz-id-2 "deadbeefdeadbeefdeadbeefdeadbeefdeadbeef" always;
            default_type application/xml;
            return 404 '<?xml version="1.0" encoding="UTF-8"?><Error><Code>NoSuchBucket</Code><Message>The specified bucket does not exist</Message></Error>';
        }
    }
}
